<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<title>Danbooru Tags</title>
	</head>
	<body class="bg-[#1a1a2e] text-gray-200 min-h-screen font-mono">
		<div id="app">
			<header class="bg-[#35495e] border-b-2 border-[#42b883] px-6 py-4">
				<h1 class="text-2xl font-bold text-[#42b883] tracking-wide">Danbooru Tags</h1>
				<p class="text-sm text-gray-400 mt-1">AI 驱动的标签翻译与改写</p>
			</header>

			<main class="max-w-2xl mx-auto p-4 space-y-5">
				<!-- API Key -->
				<section class="border border-[#35495e] bg-[#16213e]">
					<div class="flex items-center justify-between px-4 py-3 border-b border-[#35495e]">
						<span class="text-sm font-semibold text-[#42b883] uppercase tracking-wider">API Key</span>
						<button v-if="!apiSaved" @click="saveApiKey" :disabled="!apiInput.trim()"
							class="px-4 py-1 text-xs font-bold bg-[#42b883] text-[#1a1a2e] hover:bg-[#3aa876] disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
							保存
						</button>
						<div v-else class="flex gap-2">
							<button @click="toggleApiVisible"
								class="px-3 py-1 text-xs bg-[#35495e] hover:bg-[#3d5670] transition-colors">
								{{ apiVisible ? '隐藏' : '查看' }}
							</button>
							<button @click="clearApiKey"
								class="px-3 py-1 text-xs bg-red-800 hover:bg-red-700 transition-colors">
								删除
							</button>
						</div>
					</div>
					<div class="px-4 py-3" v-if="!apiSaved">
						<input v-model="apiInput" type="password" placeholder="输入你的 Gemini API Key ..."
							class="w-full px-3 py-2 bg-[#1a1a2e] border border-[#35495e] text-gray-200 text-sm placeholder-gray-600 focus:outline-none focus:border-[#42b883] transition-colors" />
					</div>
					<div class="px-4 py-3" v-else-if="apiVisible">
						<input :value="apiKey" readonly
							class="w-full px-3 py-2 bg-[#1a1a2e] border border-[#35495e] text-gray-200 text-sm focus:outline-none" />
					</div>
					<div class="px-4 py-3" v-else>
						<p class="text-sm text-gray-500">已保存 {{ maskedKey }} · 内容已隐藏</p>
					</div>
				</section>

				<!-- Mode Toggles -->
				<section class="flex gap-4 flex-wrap">
					<div class="flex-1 min-w-[160px] border border-[#35495e] bg-[#16213e] p-3">
						<div class="text-xs text-gray-400 mb-2 uppercase tracking-wider">模式</div>
						<div class="flex border border-[#35495e]">
							<button @click="mode = 'translate'"
								:class="mode === 'translate' ? 'bg-[#42b883] text-[#1a1a2e]' : 'bg-transparent text-gray-400 hover:text-gray-200'"
								class="flex-1 py-2 text-xs font-bold transition-colors">
								翻译
							</button>
							<button @click="mode = 'rewrite'"
								:class="mode === 'rewrite' ? 'bg-[#42b883] text-[#1a1a2e]' : 'bg-transparent text-gray-400 hover:text-gray-200'"
								class="flex-1 py-2 text-xs font-bold transition-colors">
								改写
							</button>
						</div>
					</div>
					<div class="flex-1 min-w-[160px] border border-[#35495e] bg-[#16213e] p-3">
						<div class="text-xs text-gray-400 mb-2 uppercase tracking-wider">请求方式</div>
						<div class="flex border border-[#35495e]">
							<button @click="streamMode = false"
								:class="!streamMode ? 'bg-[#42b883] text-[#1a1a2e]' : 'bg-transparent text-gray-400 hover:text-gray-200'"
								class="flex-1 py-2 text-xs font-bold transition-colors">
								普通
							</button>
							<button @click="streamMode = true"
								:class="streamMode ? 'bg-[#42b883] text-[#1a1a2e]' : 'bg-transparent text-gray-400 hover:text-gray-200'"
								class="flex-1 py-2 text-xs font-bold transition-colors">
								流式
							</button>
						</div>
					</div>
				</section>

				<!-- Inputs -->
				<section class="border border-[#35495e] bg-[#16213e] p-4 space-y-4">
					<div>
						<label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider">
							{{ mode === 'translate' ? '描述文本' : '改写指令' }}
						</label>
						<textarea v-model="prompt" rows="4"
							placeholder="输入中文描述，如：一个可爱的女孩，蓝色长发，穿着白色连衣裙，站在樱花树下微笑..."
							class="w-full px-3 py-2 bg-[#1a1a2e] border border-[#35495e] text-gray-200 text-sm placeholder-gray-600 focus:outline-none focus:border-[#42b883] transition-colors resize-y"></textarea>
					</div>

					<div v-if="mode === 'rewrite'">
						<label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider">原始标签</label>
						<textarea v-model="originalPrompt" rows="3"
							placeholder="输入已有的英文标签..."
							class="w-full px-3 py-2 bg-[#1a1a2e] border border-[#35495e] text-gray-200 text-sm placeholder-gray-600 focus:outline-none focus:border-[#42b883] transition-colors resize-y"></textarea>
					</div>

					<div>
						<label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider">Negative Prompt <span class="text-gray-600">(可选)</span></label>
						<textarea v-model="negativePrompt" rows="2"
							placeholder="已有的 negative prompt ..."
							class="w-full px-3 py-2 bg-[#1a1a2e] border border-[#35495e] text-gray-200 text-sm placeholder-gray-600 focus:outline-none focus:border-[#42b883] transition-colors resize-y"></textarea>
					</div>

					<button @click="submit" :disabled="loading || !canSubmit"
						class="w-full py-3 text-sm font-bold bg-[#42b883] text-[#1a1a2e] hover:bg-[#3aa876] disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
						{{ loading ? '处理中...' : '提交' }}
					</button>
				</section>

				<!-- Stream Status -->
				<section v-if="loading && streamMode" class="border border-[#35495e] bg-[#16213e] p-4">
					<div class="flex items-center gap-2 mb-3">
						<span class="inline-block w-2 h-2 bg-[#42b883] animate-pulse"></span>
						<span class="text-xs text-gray-400 uppercase tracking-wider">{{ streamStatus }}</span>
						<span v-if="retryInfo" class="text-xs text-yellow-400">{{ retryInfo }}</span>
					</div>
					<div v-if="thinking" class="mb-3">
						<div class="text-xs text-gray-500 mb-1 uppercase tracking-wider">思考过程</div>
						<div class="text-xs text-gray-400 whitespace-pre-wrap border-l-2 border-[#35495e] pl-3 max-h-40 overflow-y-auto">{{ thinking }}</div>
					</div>
					<div v-if="streamChunks" class="mb-3">
						<div class="text-xs text-gray-500 mb-1 uppercase tracking-wider">生成内容</div>
						<div class="text-sm text-gray-200 whitespace-pre-wrap border-l-2 border-[#42b883] pl-3 max-h-40 overflow-y-auto">{{ streamChunks }}</div>
					</div>
				</section>

				<!-- Error -->
				<section v-if="error" class="border border-red-800 bg-[#2d1b1b] p-4">
					<div class="text-xs text-red-400 mb-1 uppercase tracking-wider">错误</div>
					<p class="text-sm text-red-300 whitespace-pre-wrap">{{ error }}</p>
				</section>

				<!-- Results -->
				<section v-if="result" class="border border-[#35495e] bg-[#16213e]">
					<div class="px-4 py-3 border-b border-[#35495e]">
						<span class="text-xs text-gray-400 uppercase tracking-wider">结果</span>
					</div>
					<div class="p-4 space-y-4">
						<div v-if="result.positive">
							<div class="text-xs text-[#42b883] mb-1 uppercase tracking-wider">Positive</div>
							<div class="text-sm text-gray-200 whitespace-pre-wrap break-all border-l-2 border-[#42b883] pl-3">{{ result.positive }}</div>
							<button @click="copy(result.positive)"
								class="mt-2 px-3 py-1 text-xs bg-[#35495e] hover:bg-[#3d5670] transition-colors">
								复制
							</button>
						</div>
						<div v-if="result.negative">
							<div class="text-xs text-red-400 mb-1 uppercase tracking-wider">Negative</div>
							<div class="text-sm text-gray-200 whitespace-pre-wrap break-all border-l-2 border-red-600 pl-3">{{ result.negative }}</div>
							<button @click="copy(result.negative)"
								class="mt-2 px-3 py-1 text-xs bg-[#35495e] hover:bg-[#3d5670] transition-colors">
								复制
							</button>
						</div>
					</div>
				</section>
			</main>
		</div>

		<script>
			const { createApp, ref, computed } = Vue;

			createApp({
				setup() {
					const apiInput = ref('');
					const apiKey = ref(localStorage.getItem('gemini_api_key') || '');
					const apiSaved = ref(!!apiKey.value);
					const apiVisible = ref(false);

					const maskedKey = computed(() => {
						const k = apiKey.value;
						if (k.length <= 8) return '***';
						return k.slice(0, 4) + '****' + k.slice(-4);
					});

					function saveApiKey() {
						const val = apiInput.value.trim();
						if (!val) return;
						apiKey.value = val;
						localStorage.setItem('gemini_api_key', val);
						apiSaved.value = true;
						apiVisible.value = false;
						apiInput.value = '';
					}

					function clearApiKey() {
						apiKey.value = '';
						apiInput.value = '';
						localStorage.removeItem('gemini_api_key');
						apiSaved.value = false;
						apiVisible.value = false;
					}

					function toggleApiVisible() {
						apiVisible.value = !apiVisible.value;
					}

					const mode = ref('translate');
					const streamMode = ref(false);

					const prompt = ref('');
					const originalPrompt = ref('');
					const negativePrompt = ref('');

					const loading = ref(false);
					const error = ref('');
					const result = ref(null);
					const streamStatus = ref('');
					const thinking = ref('');
					const streamChunks = ref('');
					const retryInfo = ref('');

					const canSubmit = computed(() => {
						if (mode.value === 'rewrite') {
							return prompt.value.trim() && originalPrompt.value.trim();
						}
						return prompt.value.trim();
					});

					function resetState() {
						error.value = '';
						result.value = null;
						streamStatus.value = '';
						thinking.value = '';
						streamChunks.value = '';
						retryInfo.value = '';
					}

					async function submit() {
						if (!canSubmit.value || loading.value) return;
						resetState();
						loading.value = true;

						const body = {
							prompt: prompt.value.trim(),
							apiKey: apiKey.value,
						};
						if (originalPrompt.value.trim()) body.original_prompt = originalPrompt.value.trim();
						if (negativePrompt.value.trim()) body.negative_prompt = negativePrompt.value.trim();

						try {
							if (streamMode.value) {
								await submitStream(body);
							} else {
								await submitNormal(body);
							}
						} catch (e) {
							error.value = e.message || String(e);
						} finally {
							loading.value = false;
							streamStatus.value = '';
						}
					}

					async function submitNormal(body) {
						const endpoint = mode.value === 'rewrite' ? '/api/rewrite' : '/api/translate';
						const resp = await fetch(endpoint, {
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify(body),
						});
						const data = await resp.json();
						if (!resp.ok) throw new Error(data.error || 'HTTP ' + resp.status);
						result.value = data;
					}

					async function submitStream(body) {
						body.mode = mode.value;

						const resp = await fetch('/api/stream', {
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify(body),
						});

						if (!resp.ok) {
							const data = await resp.json().catch(() => ({}));
							throw new Error(data.error || 'HTTP ' + resp.status);
						}

						const reader = resp.body.getReader();
						const decoder = new TextDecoder();
						let buffer = '';

						while (true) {
							const { done, value } = await reader.read();
							if (done) break;
							buffer += decoder.decode(value, { stream: true });

							const parts = buffer.split('\n\n');
							buffer = parts.pop() || '';

							for (const part of parts) {
								let eventType = '';
								let dataStr = '';
								for (const line of part.split('\n')) {
									const t = line.trim();
									if (t.startsWith('event:')) eventType = t.slice(6).trim();
									else if (t.startsWith('data:')) dataStr = t.slice(5).trim();
								}
								if (!dataStr) continue;
								try {
									const data = JSON.parse(dataStr);
									handleStreamEvent(data, eventType);
								} catch { /* skip */ }
							}
						}
					}

					function handleStreamEvent(data, eventType) {
						switch (eventType) {
							case 'status':
								streamStatus.value = data.status === 'generating' ? '生成中...' :
									data.status === 'done' ? '完成' :
									data.status === 'error' ? '出错' : data.status;
								break;
							case 'chunk':
								streamChunks.value += data.text || '';
								break;
							case 'retry':
								retryInfo.value = '重试 ' + data.attempt + '/' + data.maxRetries + ': ' + data.message;
								break;
							case 'result':
								result.value = data;
								break;
							case 'error':
								error.value = data.message;
								break;
						}
					}

					async function copy(text) {
						try {
							await navigator.clipboard.writeText(text);
						} catch {
							const ta = document.createElement('textarea');
							ta.value = text;
							document.body.appendChild(ta);
							ta.select();
							document.execCommand('copy');
							document.body.removeChild(ta);
						}
					}

					return {
						apiInput, apiKey, apiSaved, apiVisible, maskedKey,
						saveApiKey, clearApiKey, toggleApiVisible,
						mode, streamMode,
						prompt, originalPrompt, negativePrompt,
						loading, error, result,
						streamStatus, thinking, streamChunks, retryInfo,
						canSubmit, submit, copy,
					};
				}
			}).mount('#app');
		</script>
	</body>
</html>
